spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/payae
    username: payae_user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      fail-on-empty-beans: false

server:
  port: 8080

jwt:
  secret: payaesecretkeypayae
  expiration: 86400000

razorpay:
  key: YOUR_TEST_KEY
  secret: YOUR_TEST_SECRET